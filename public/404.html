<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Quasar Framework · 中文文档</title>
  <script>
    // GitHub Pages SPA redirect — sends unknown paths back to index.html
    // so Vue Router can handle them. Based on spa-github-pages (MIT).
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(0).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
